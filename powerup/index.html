<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex">

    <title>Scandora — Trello Power-Up</title>
    <meta name="description" content="Scandora Trello Power-Up connector. Adds a &quot;Scan with Scandora&quot; button to your Trello boards and cards.">

    <link rel="icon" type="image/svg+xml" href="../favicon.svg">

    <script src="https://p.trello.com/power-up.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: #1e293b;
            background: #ffffff;
        }
        main {
            max-width: 32rem;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            line-height: 1.5;
        }
        h1 { font-size: 1.25rem; margin: 0 0 0.75rem; }
        p { margin: 0 0 0.75rem; color: #475569; }
        a { color: #2563eb; }
        @media (prefers-color-scheme: dark) {
            html, body { background: #0f172a; color: #e2e8f0; }
            p { color: #94a3b8; }
            a { color: #60a5fa; }
        }
    </style>
</head>
<body>
    <main>
        <h1>Scandora — Trello Power-Up</h1>
        <p>This page is the connector Trello loads to run the Scandora Power-Up. It has no standalone content.</p>
        <p>It adds a <strong>Scan with Scandora</strong> button to your boards and cards. Learn more at <a href="https://scandora.eu/">scandora.eu</a>.</p>
    </main>

    <script src="client.js"></script>
</body>
</html>
